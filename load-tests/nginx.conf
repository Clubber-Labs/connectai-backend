# Load balancer do cluster de teste (docker-compose profile `cluster`).
# Round-robin entre as N réplicas do serviço `api` via DNS interno do Docker.
#
# Truque: usar o resolver do Docker (127.0.0.11) + proxy_pass por VARIÁVEL faz o
# nginx re-resolver `api` a cada janela; o DNS do Docker devolve os IPs das
# réplicas em rodízio -> balanceamento entre todas as réplicas do `--scale`.
# (Com `proxy_pass http://api:3333` literal o nginx resolveria UMA vez no boot e
# fixaria numa réplica só.)

worker_processes auto;
events {
  worker_connections 8192;
}

http {
  access_log off; # não medir latência de disco do LB
  resolver 127.0.0.11 valid=5s ipv6=off;

  server {
    listen 3333;

    location / {
      set $api_upstream http://api:3333;
      proxy_pass $api_upstream$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
