global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: connectai-backend
    metrics_path: /metrics
    # Se o backend definir METRICS_TOKEN, o scraper precisa enviá-lo:
    # authorization:
    #   type: Bearer
    #   credentials: <mesmo valor de METRICS_TOKEN>
    static_configs:
      # O backend roda no host; de dentro do container usa-se host.docker.internal.
      - targets: ['host.docker.internal:3333']
        labels:
          service: connectai-backend

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
