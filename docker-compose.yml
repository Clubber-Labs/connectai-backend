services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: conectai-postgres
    restart: unless-stopped
    ports:
      # Bind só no loopback: o banco não deve ficar acessível pela rede/LAN.
      # (antes "5432:5432" publicava em 0.0.0.0). O app local conecta via 127.0.0.1.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conectai_dev
    volumes:
      - conectai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conectai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Redis sem autenticação — manter só no loopback (antes "6379:6379" em 0.0.0.0).
      - "127.0.0.1:6379:6379"
    volumes:
      - conectai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  conectai_pgdata:
  conectai_redis_data:
